<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>電気料金シミュレーション（動作確認用）</title>
</head>
<body>

  <h1>電気料金シミュレーション（テスト）</h1>
  
  <form id="simulationForm">
    <p>郵便番号: <input type="text" id="postcode" value="0600001"></p>
    <p>電気代(10月): <input type="number" id="bill" value="10000"></p>
    <button type="submit">シミュレーション実行</button>
  </form>

  <p id="statusText" style="color: blue; font-weight: bold;"></p>
  <pre id="resultArea" style="background: #eee; padding: 10px; display: none;"></pre>

<script>
// ページが読み込まれたことを確認
console.log("スクリプトは正常に読み込まれました。");

document.getElementById('simulationForm').addEventListener('submit', async function(e) {
  e.preventDefault(); // 画面の再読み込みを防ぐ
  
  console.log("ボタンが押されました！通信を開始します...");
  const statusText = document.getElementById('statusText');
  const resultArea = document.getElementById('resultArea');
  
  statusText.textContent = "通信中...";
  resultArea.style.display = 'none';

  const postcode = document.getElementById('postcode').value;
  const bill = document.getElementById('bill').value;

  // 12ヶ月分の配列（10月だけ入力値を入れる）
  const monthly_values = Array(12).fill("");
  monthly_values[9] = String(bill); // 10月はインデックス9

  const currentYear = new Date().getFullYear();
  const latestYearMonth = `${currentYear}10`; // 10月固定

  const apiPayload = {
    request_id: `req_${Date.now()}`,
    postcode: postcode,
    all_electric: false,
    weekday_night_usage_percentage: 75,
    holiday_night_usage_percentage: 55,
    number_of_family: 3,
    elec: {
      current_plan_code: "czkxj|hzozmtmvoztgdbcodibtw-czkxj",
      target_plan_codes: [
        "czkxj|hzozmtmvoztgdbcodibtw-czkxj",
        "nvhkgzvbvn|hzozmtmvoztgdbcodibtw-czkxj",
        "nvhkgzvbvn|hzozmtmvoztgdbcodibtwtb-czkxj"
      ],
      contract_ampere: 40,
      unit_type: 1,
      power_factor: 85,
      monthly_type: 2, 
      monthly_values: monthly_values,
      latest_year_month: latestYearMonth,
      use_profiler: true, 
      weekday_usage_percentage: 65,
      weekday_daytime_usage_percentage: 25,
      holiday_daytime_usage_percentage: 25,
      daytime_from: 8,
      nighttime_from: 20,
      profiler_options: null
    }
  };

  try {
    const response = await fetch('https://stg-emap-api.enechange.jp/simulation/v2/elec', {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'X-EMAP-USER-KEY': 'r7jCwxyBGThxS6EHvfmqFe9eSssfiePg' 
      },
      body: JSON.stringify(apiPayload)
    });

    console.log("レスポンスのステータス:", response.status);

    const data = await response.json();
    console.log("APIからのデータ:", data);

    if (!response.ok) {
      throw new Error(`エラー: ${response.status} - ${JSON.stringify(data)}`);
    }

    statusText.textContent = "通信成功！";
    resultArea.textContent = JSON.stringify(data, null, 2);
    resultArea.style.display = 'block';

  } catch (error) {
    statusText.textContent = "エラーが発生しました";
    resultArea.textContent = error.message;
    resultArea.style.display = 'block';
    console.error("通信エラー詳細:", error);
  }
});
</script>
</body>
</html>
