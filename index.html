<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電気料金シミュレーション | ENECHANGE</title>
  <style>
    body { font-family: "Hiragino Sans", "Meiryo", sans-serif; background-color: #f4f5f7; color: #333; padding: 20px; margin: 0; }
    
    /* バナーコンテナのスタイル */
    .banner-container {
      width: 100%;
      max-width: 800px;
      margin: 0 auto 20px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .banner-container img {
      width: 100%;
      height: auto;
      display: block;
    }

    .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h1 { font-size: 1.5rem; text-align: center; color: #e56000; margin-top: 0; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; }
    input[type="number"], select, input[type="text"] { width: 100%; padding: 10px; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    .btn-submit { width: 100%; padding: 15px; font-size: 1.2rem; font-weight: bold; color: #fff; background-color: #e56000; border: none; border-radius: 30px; cursor: pointer; transition: background 0.3s; }
    .btn-submit:hover { background-color: #cc5500; }
    
    /* 追加：お申し込みボタン用のスタイル */
    .btn-apply { display: inline-block; width: 100%; padding: 15px; background: #e56000; color: #fff; text-decoration: none; text-align: center; font-weight: bold; border-radius: 30px; box-sizing: border-box; transition: background 0.3s; }
    .btn-apply:hover { background: #cc5500; }

    #resultArea { margin-top: 30px; padding: 20px; background: #fff8f3; border: 1px solid #ffccaa; border-radius: 8px; display: none; }
    .loading { text-align: center; display: none; color: #666; margin-top: 20px; font-weight: bold; }
    .error-msg { color: #d9534f; margin-top: 10px; font-weight: bold; font-size: 0.9rem; }
  </style>
</head>
<body>

  <div class="banner-container">
    <img src="https://raw.githubusercontent.com/tetsuya-ono-enechange/Simulation/refs/heads/main/enechange_banner.png.png" alt="ENECHANGEでんき イメージバナー">
  </div>

<div class="container">
  <h1>電気料金シミュレーション</h1>
  
  <form id="simulationForm">
    <div class="form-group">
      <label for="postcode">郵便番号（ハイフンなし）</label>
      <input type="text" id="postcode" value="0600001" placeholder="例: 0600001" required>
    </div>

    <div class="form-group">
      <label for="currentProvider">現在の電力会社</label>
      <select id="currentProvider" required>
        <option value="" disabled selected>電力会社を選択してください</option>
        <option value="hepco">北海道電力</option>
        <option value="tepco">東京電力</option>
        <option value="chuden">中部電力</option>
        <option value="kanden">関西電力</option>
      </select>
    </div>

    <div class="form-group">
      <label for="currentPlan">現在のプラン</label>
      <select id="currentPlan" required disabled>
        <option value="" disabled selected>電力会社を先に選択してください</option>
      </select>
    </div>

    <div class="form-group">
      <label for="amperage">現在の契約アンペア数</label>
      <select id="amperage" required>
        <option value="20">20A</option>
        <option value="30">30A</option>
        <option value="40" selected>40A</option>
        <option value="50">50A</option>
        <option value="60">60A</option>
      </select>
    </div>

    <div class="form-group">
      <label for="month">電気代がわかる月</label>
      <select id="month" required>
        <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
        <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
        <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
        <option value="10" selected>10月</option><option value="11">11月</option><option value="12">12月</option>
      </select>
    </div>

    <div class="form-group">
      <label for="bill">1ヶ月の電気代（円）</label>
      <input type="number" id="bill" value="10000" placeholder="例: 10000" required>
    </div>

    <button type="submit" class="btn-submit">シミュレーションする</button>
  </form>

  <div class="loading" id="loadingText">計算中...しばらくお待ちください。</div>
  <div id="errorMessage" class="error-msg"></div>

  <div id="resultArea">
    <h2 style="font-size:1.2rem; color:#333; margin-top:0;">シミュレーション結果</h2>
    <p style="margin-bottom: 5px; font-size: 0.9rem;">おすすめのプランに切り替えると...</p>
    <p style="font-size:1.6rem; font-weight:bold; color:#d9534f; margin:0 0 15px 0;" id="savingsText"></p>
    
    <div style="background: #fff; padding: 10px; border-radius: 4px; border: 1px solid #eee; margin-bottom: 20px;">
      <p style="margin: 0; font-size: 0.9rem; color: #666;">おすすめプラン</p>
      <p style="margin: 5px 0 0 0; font-weight: bold; font-size: 1.1rem;" id="planDetails"></p>
    </div>

    <a href="apply.html" id="applyLinkBtn" class="btn-apply">このプランに申し込む</a>
  </div>
</div>

<script>
  // <script> 内の冒頭に追加
window.addEventListener('DOMContentLoaded', (event) => {
    const config = JSON.parse(localStorage.getItem('enechange_config'));
    
    if (config) {
        // バナーURLの反映
        if (config.bannerUrl) {
            const bannerImg = document.querySelector('.banner-container img');
            if (bannerImg) bannerImg.src = config.bannerUrl;
        }

        // デフォルト電力会社の反映
        if (config.defaultProvider) {
            const providerSelect = document.getElementById('currentProvider');
            providerSelect.value = config.defaultProvider;
            
            // dispatchEventを呼ぶことで、連動しているプラン選択肢を更新させる
            providerSelect.dispatchEvent(new Event('change'));
        }
    }
});
// 電力会社とプランのサンプルデータ
const providersAndPlans = {
  hepco: {
    name: "北海道電力",
    plans: [
      { code: "czkxj|hzozmtmvoztgdbcodibtw-czkxj", name: "従量電灯B" },
      { code: "czkxj|hzozmtmvoztgdbcodibtwtb-czkxj", name: "スマート電灯" }
    ]
  },
  tepco: {
    name: "東京電力",
    plans: [
      { code: "meter_rate_lighting_b", name: "従量電灯B" },
      { code: "premium_plan", name: "プレミアムプラン" }
    ]
  },
  chuden: {
    name: "中部電力",
    plans: [
      { code: "meter_rate_lighting_b", name: "従量電灯B" },
      { code: "e_point_plan", name: "ポイントプラン" }
    ]
  },
  kanden: {
    name: "関西電力",
    plans: [
      { code: "meter_rate_lighting_a", name: "従量電灯A" },
      { code: "e_time_plan", name: "はぴeタイムR" }
    ]
  }
};

const currentProvider = document.getElementById('currentProvider');
const currentPlan = document.getElementById('currentPlan');

// 電力会社選択時の連動処理
currentProvider.addEventListener('change', function() {
  const selectedProvider = this.value;
  currentPlan.innerHTML = '<option value="" disabled selected>プランを選択してください</option>';
  currentPlan.disabled = true;

  if (providersAndPlans[selectedProvider]) {
    providersAndPlans[selectedProvider].plans.forEach(plan => {
      const option = document.createElement('option');
      option.value = plan.code;
      option.textContent = plan.name;
      currentPlan.appendChild(option);
    });
    currentPlan.disabled = false;
  }
});

document.getElementById('simulationForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const postcode = document.getElementById('postcode').value;
  const currentPlanCode = currentPlan.value;
  const amperage = parseInt(document.getElementById('amperage').value);
  const month = parseInt(document.getElementById('month').value);
  const bill = parseInt(document.getElementById('bill').value);

  const loadingText = document.getElementById('loadingText');
  const resultArea = document.getElementById('resultArea');
  const errorMessage = document.getElementById('errorMessage');
  
  loadingText.style.display = 'block';
  resultArea.style.display = 'none';
  errorMessage.textContent = '';

  const monthly_values = [String(bill), "", "", "", "", "", "", "", "", "", "", ""];

  let targetYear = new Date().getFullYear();
  const currentMonth = new Date().getMonth() + 1;
  if (month > currentMonth) {
    targetYear -= 1;
  }
  const latestYearMonth = `${targetYear}${String(month).padStart(2, '0')}`;

  const apiPayload = {
    request_id: `req_${Date.now()}`,
    postcode: postcode,
    all_electric: false,
    weekday_night_usage_percentage: 75,
    holiday_night_usage_percentage: 55,
    number_of_family: 3,
    elec: {
      current_plan_code: currentPlanCode,
      target_plan_codes: [
        "czkxj|hzozmtmvoztgdbcodibtw-czkxj",
        "nvhkgzvbvn|hzozmtmvoztgdbcodibtw-czkxj",
        "nvhkgzvbvn|hzozmtmvoztgdbcodibtwtb-czkxj"
      ],
      contract_ampere: amperage,
      unit_type: 1, 
      power_factor: 85,
      monthly_type: 1, 
      monthly_values: monthly_values,
      latest_year_month: latestYearMonth,
      use_profiler: true, 
      weekday_usage_percentage: 65,
      weekday_daytime_usage_percentage: 25,
      holiday_daytime_usage_percentage: 25,
      daytime_from: 8,
      nighttime_from: 20,
      profiler_options: null
    }
  };

  try {
    const response = await fetch('https://stg-emap-api.enechange.jp/simulation/v2/elec', {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'X-EMAP-USER-KEY': 'r7jCwxyBGThxS6EHvfmqFe9eSssfiePg' 
      },
      body: JSON.stringify(apiPayload)
    });

    const data = await response.json();

    if (!response.ok) {
      console.error("API Error Data:", data);
      throw new Error(data.detail || data.message || `APIエラー (ステータスコード: ${response.status})`);
    }

    if (!data.target_plans || data.target_plans.length === 0) {
      throw new Error('シミュレーション可能なプランが見つかりませんでした。');
    }

    let bestPlan = data.target_plans[0].elec;
    for (const plan of data.target_plans) {
      if ((plan.elec.year_saving || 0) > (bestPlan.year_saving || 0)) {
        bestPlan = plan.elec;
      }
    }

    const savingAmount = bestPlan.year_saving || 0;

    if (savingAmount > 0) {
      document.getElementById('savingsText').textContent = `年間 約 ${savingAmount.toLocaleString()} 円 おトク！`;
    } else {
      document.getElementById('savingsText').textContent = `現在のプランが一番お得です！`;
    }
    document.getElementById('planDetails').textContent = `${bestPlan.provider_name} - ${bestPlan.plan_name}`;
    
    // 追加：おすすめプランのデータを安全にボタンのURL（パラメータ）にセットする
    const applyLinkBtn = document.getElementById('applyLinkBtn');
    if(applyLinkBtn) {
      applyLinkBtn.href = `apply.html?plan_code=${bestPlan.plan_code}&plan_name=${encodeURIComponent(bestPlan.plan_name)}`;
    }

    resultArea.style.display = 'block';

  } catch (error) {
    errorMessage.textContent = 'シミュレーションに失敗しました: ' + error.message;
    console.error(error);
  } finally {
    loadingText.style.display = 'none';
  }
});
</script>
</body>
</html>
