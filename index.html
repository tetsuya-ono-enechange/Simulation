<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電気料金シミュレーション</title>
  <style>
    body {
      font-family: "Hiragino Sans", "Meiryo", sans-serif;
      background-color: #f4f5f7;
      color: #333;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 1.5rem;
      text-align: center;
      color: #e56000; /* au風のオレンジ */
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
    }
    input[type="number"], select {
      width: 100%;
      padding: 10px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .btn-submit {
      width: 100%;
      padding: 15px;
      font-size: 1.2rem;
      font-weight: bold;
      color: #fff;
      background-color: #e56000;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn-submit:hover {
      background-color: #cc5500;
    }
    #resultArea {
      margin-top: 30px;
      padding: 20px;
      background: #fff8f3;
      border: 1px solid #ffccaa;
      border-radius: 8px;
      display: none;
    }
    .loading {
      text-align: center;
      display: none;
      color: #666;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>電気料金シミュレーション</h1>
  
  <form id="simulationForm">
    <div class="form-group">
      <label for="postalCode">郵便番号（ハイフンなし）</label>
      <input type="number" id="postalCode" placeholder="例: 1000001" required>
    </div>

    <div class="form-group">
      <label for="amperage">現在の契約アンペア数</label>
      <select id="amperage" required>
        <option value="20">20A</option>
        <option value="30" selected>30A</option>
        <option value="40">40A</option>
        <option value="50">50A</option>
        <option value="60">60A</option>
      </select>
    </div>

    <div class="form-group">
      <label for="month">電気代がわかる月</label>
      <select id="month" required>
        <option value="1">1月</option>
        <option value="2">2月</option>
        <option value="3">3月</option>
        <option value="4">4月</option>
        <option value="5">5月</option>
        <option value="6">6月</option>
        <option value="7">7月</option>
        <option value="8">8月</option>
        <option value="9">9月</option>
        <option value="10">10月</option>
        <option value="11">11月</option>
        <option value="12">12月</option>
      </select>
    </div>

    <div class="form-group">
      <label for="bill">1ヶ月の電気代（円）</label>
      <input type="number" id="bill" placeholder="例: 8000" required>
    </div>

    <button type="submit" class="btn-submit">シミュレーションする</button>
  </form>

  <div class="loading" id="loadingText">計算中...しばらくお待ちください。</div>

  <div id="resultArea">
    <h2 style="font-size:1.2rem; color:#333;">シミュレーション結果</h2>
    <p>おすすめのプランに切り替えると...</p>
    <p style="font-size:1.5rem; font-weight:bold; color:#d9534f;" id="savingsText"></p>
    <div id="planDetails"></div>
  </div>
</div>

<script>
document.getElementById('simulationForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  // 入力値の取得
  const payload = {
    postalCode: document.getElementById('postalCode').value,
    amperage: parseInt(document.getElementById('amperage').value),
    month: parseInt(document.getElementById('month').value),
    bill: parseInt(document.getElementById('bill').value)
  };

  const loadingText = document.getElementById('loadingText');
  const resultArea = document.getElementById('resultArea');
  
  loadingText.style.display = 'block';
  resultArea.style.display = 'none';

  try {
    // バックエンドのAPIへリクエスト送信
    const response = await fetch('/api/simulate', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(payload)
    });

    const data = await response.json();

    if (!response.ok) throw new Error('API通信エラー');

    // 成功時: 結果を画面にバインド（※レスポンス構造は仕様書に合わせて調整してください）
    const savingsAmount = data.savingsAmount || "データなし";
    const recommendedPlan = data.recommendedPlanName || "該当プランなし";

    document.getElementById('savingsText').textContent = `年間 約 ${savingsAmount} 円 おトク！`;
    document.getElementById('planDetails').textContent = `おすすめプラン: ${recommendedPlan}`;
    
    resultArea.style.display = 'block';

  } catch (error) {
    alert('シミュレーションの実行に失敗しました。');
    console.error(error);
  } finally {
    loadingText.style.display = 'none';
  }
});
</script>
</body>
</html>
