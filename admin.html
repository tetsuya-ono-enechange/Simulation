<div class="admin-panel hidden" id="configArea">
    <h2>バナー・初期設定変更</h2>
    
    <label>バナー画像をアップロード</label>
    <input type="file" id="fileInput" accept="image/*">
    <div id="previewArea" style="margin-top:10px;"><img id="imgPreview" style="max-width:100%; display:none;"></div>
    
    <label style="margin-top:20px; display:block;">デフォルト電力会社</label>
    <select id="configDefaultProvider">
        <option value="hepco">北海道電力</option>
        <option value="tepco">東京電力</option>
        <option value="chuden">中部電力</option>
        <option value="kanden">関西電力</option>
    </select>

    <button onclick="saveConfig()" id="saveBtn">設定を保存する</button>
</div>

<script>
// 画像プレビュー表示処理
document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
        const img = document.getElementById('imgPreview');
        img.src = event.target.result;
        img.style.display = 'block';
    };
    reader.readAsDataURL(file);
});

async function saveConfig() {
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.innerText = "保存中...";
    saveBtn.disabled = true;

    const password = document.getElementById('adminPass').value;
    const fileInput = document.getElementById('fileInput');
    const file = fileInput.files[0];

    let imageData = null;
    let fileName = null;

    // ファイルが選択されている場合、Base64に変換
    if (file) {
        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
        imageData = await toBase64(file);
        fileName = file.name;
    }

    const payload = {
        password: password,
        imageData: imageData,
        fileName: fileName,
        config: {
            defaultProvider: document.getElementById('configDefaultProvider').value
        }
    };

    try {
        const response = await fetch(GAS_API_URL, {
            method: "POST",
            body: JSON.stringify(payload)
        });
        const result = await response.text();
        if (result === "Success") {
            alert("アップロード完了！バナーが更新されました。");
            location.reload(); 
        } else {
            alert("エラー: " + result);
        }
    } catch (e) {
        alert("通信エラーが発生しました");
    } finally {
        saveBtn.innerText = "設定を保存する";
        saveBtn.disabled = false;
    }
}
</script>
